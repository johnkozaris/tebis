[graph]
all-features = false

[advisories]
ignore = []
version = 2
yanked = "deny"

[bans]
deny = [
  {name = "openssl"},
  {name = "openssl-sys"},
  {name = "native-tls"},
  {name = "aws-lc-rs"},
  {name = "aws-lc-sys"},
  {name = "reqwest"},
]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
version = 2

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
