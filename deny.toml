[graph]
all-features = false

[advisories]
ignore = []
version = 2
yanked = "deny"

[bans]
deny = [
  {name = "openssl"},
  {name = "openssl-sys"},
  {name = "native-tls"},
  {name = "aws-lc-rs"},
  {name = "aws-lc-sys"},
  {name = "reqwest"},
]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  # Unlicense is a public-domain-equivalent license (explicit copyright
  # disclaimer). OSI-approved and FSF-Free. Pulled in transitively by
  # `whisper-rs-sys` — the actual whisper.cpp C source it wraps is MIT.
  "Unlicense",
  # MPL-2.0 is weak (file-level) copyleft: OSI + FSF approved, and
  # merely linking against an MPL-2.0 crate does not copyleft our
  # own source. Pulled in transitively by `option-ext` via
  # `dirs-sys` via `directories` — the cross-platform standard-dirs
  # helper we rely on for Windows Known Folder resolution.
  "MPL-2.0",
]
confidence-threshold = 0.93
version = 2

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
