[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # We use rustls exclusively — reject the OpenSSL stack.
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    # rustls's other crypto backend — we use `ring` deliberately (smaller
    # build graph, no C toolchain). Reject aws-lc-rs so a feature-flag
    # flip in a transitive dep can't silently pull it back in.
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
    # Migrated off reqwest to hyper directly (−107 transitive crates).
    # Catch the regression if a future dep tries to pull it in.
    { name = "reqwest" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
