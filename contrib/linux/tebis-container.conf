# Drop-in: relaxes the hardening directives in tebis.service that user
# systemd cannot apply inside an unprivileged container (LXC/Incus,
# unprivileged Docker/Podman). Symptom without this override:
# `Failed to drop capabilities: Operation not permitted` and exit
# code 218/CAPABILITIES, then constant restart loop.
#
# The container itself provides the sandbox boundary, so disabling the
# in-process hardening is the correct trade-off here.
#
# Installed automatically by `tebis install` when a container is
# detected (and the user confirms). Remove with `tebis uninstall`.
#
# NOTE: do NOT add `CapabilityBoundingSet=` here — an empty value means
# "drop all caps", which is exactly the operation that fails. Leaving
# the directive unset inherits the user manager's bounding set.
[Service]
NoNewPrivileges=no
ProtectSystem=no
ProtectHome=no
ProtectKernelTunables=no
ProtectKernelModules=no
ProtectKernelLogs=no
ProtectControlGroups=no
ProtectClock=no
ProtectProc=default
ProcSubset=all
RestrictAddressFamilies=
RestrictNamespaces=no
RestrictRealtime=no
RestrictSUIDSGID=no
LockPersonality=no
MemoryDenyWriteExecute=no
SystemCallArchitectures=
SystemCallFilter=
