name: Feature request
description: Suggest an improvement or new use case.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Tebis does not handle well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Tebis do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried instead?
  - type: dropdown
    id: platform
    attributes:
      label: Relevant platform
      options:
        - All
        - macOS
        - Linux
        - Windows
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps Tebis single-user and local-first.
          required: true
        - label: This does not require exposing a non-local network listener.
          required: true
