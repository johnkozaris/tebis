name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings
      # Pedantic + nursery run non-fatally so style hints surface in CI
      # logs without blocking merges. Promote to `-D warnings` after a
      # dedicated polish pass.
      - run: cargo clippy --all-targets --locked -- -W clippy::pedantic -W clippy::nursery
        continue-on-error: true

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --all-targets
      # Kokoro-gated tests live in the separate `tebis-tts-kokoro`
      # crate. Without `--features kokoro` the tebis adapter + the
      # crate itself still compile, but the crate's 49 unit tests
      # never exercise. Run them explicitly.
      - run: cargo test --locked --workspace --features tebis/kokoro

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Report binary size
        run: ls -lh target/release/tebis

  # Push/PR-time dep-graph audit. Fixes the class of "banned crate
  # introduced in a PR and only caught by the nightly audit.yml the
  # following day." Inputs here are all hard-coded — no untrusted
  # user content reaches any `run:` shell.
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # The hook scripts are embedded via `include_str!` and ship inside
  # the release binary; a shell-level regression caught only at runtime
  # shows up as silent no-ops on every user's host. shellcheck catches
  # structural issues (SC2015 misuse of && ||, unset vars, subtle quoting
  # bugs) that `bash -n` doesn't. `ubuntu-latest` has shellcheck
  # pre-installed.
  shellcheck:
    name: shellcheck hook scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck contrib/
        run: shellcheck --severity=warning contrib/claude/claude-hook.sh contrib/copilot/copilot-hook.sh

  # Windows build + clippy + unit tests. The test scratch-dir override
  # goes through TEBIS_SCRATCH_DIR (honored by `platform::paths` in
  # test builds), which is platform-neutral — Windows's Known Folder
  # API ignores XDG_* but picks up this env var, so agent_hooks and
  # manifest tests run against scratch paths the same way they do on
  # Unix. Unix-only tests (peer_listener UDS, script_e2e_tests .sh
  # harness, tmux stderr classifier) are cfg-gated and skipped.
  windows-test:
    name: cargo test (windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --all-targets
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked --all-targets
      # PowerShell syntax-parse the embedded hook scripts. `[scriptblock]::Create`
      # parses without executing, so this is the PowerShell sibling of
      # shellcheck on the `.sh` scripts. windows-latest ships PowerShell
      # 5.1 as `powershell.exe` and (since 2024) PowerShell 7 as `pwsh.exe`;
      # either works here.
      - name: Parse-check embedded .ps1 hook scripts
        shell: pwsh
        run: |
          $null = [ScriptBlock]::Create((Get-Content -Raw contrib/claude/claude-hook.ps1))
          $null = [ScriptBlock]::Create((Get-Content -Raw contrib/copilot/copilot-hook.ps1))
