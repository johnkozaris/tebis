[package]
description = "Telegram-tmux bridge for driving AI coding agents from a phone"
edition = "2024"
license = "MIT"
name = "tebis"
publish = false
rust-version = "1.95"
version = "0.1.1"

[dependencies]
anyhow = "1"
bytes = "1"
# TUI primitives for `tebis setup` — prompts, colored headers, validators.
# Only used by the setup wizard and the run-time banner; adds ~10 small
# crates (console+unicode-width family) to the graph. Skipped entirely
# when building `--no-default-features`, but defaults stay on because
# setup is the primary onboarding path.
console = "0.16.3"
dialoguer = {version = "0.12", default-features = false}
http-body-util = "0.1.3"
hyper = {version = "1.9.0", default-features = false, features = ["client", "http1", "server"]}
hyper-rustls = {version = "0.27.9", default-features = false, features = ["ring", "http1", "webpki-tokio", "tls12"]}
hyper-util = {version = "0.1.20", default-features = false, features = ["client", "client-legacy", "http1", "tokio"]}
libc = "0.2.185"
# Direct dep so `ring::digest::SHA256` is available to the audio subsystem
# for streaming SHA-256 verification during model downloads. `ring` is
# already in the graph transitively via `hyper-rustls`/`rustls` (same
# version 0.17), so this adds zero binary size — just API access.
ring = "0.17"
rustls = {version = "0.23.38", default-features = false, features = ["ring", "std", "tls12", "logging"]}
secrecy = "0.10.3"
serde = {version = "1.0.228", features = ["derive"]}
serde_json = "1.0.149"
strip-ansi-escapes = "0.2.1"
thiserror = "2.0.18"
tokio = {version = "1.52.1", features = ["rt-multi-thread", "macros", "signal", "process", "time", "sync", "net", "io-util"]}
tokio-util = {version = "0.7.18", features = ["rt"]}
tracing = "0.1.44"
tracing-subscriber = {version = "0.3.23", features = ["fmt", "env-filter"]}

# Local STT — whisper.cpp Rust bindings, linked in-process. Inference
# runs inside the tebis daemon, no subprocess / server / network hop.
# Models are downloaded on first use (see src/audio/fetch.rs) and
# kept under $XDG_DATA_HOME/tebis/models/. On macOS we enable Metal
# so inference uses the GPU; Core ML would add another tier of
# acceleration but requires a separate `.mlmodelc` download per
# model — deferred to a later phase. On Linux the default build is
# pure CPU (OpenBLAS can be layered later via a cargo feature).
[target.'cfg(target_os = "macos")'.dependencies]
whisper-rs = {version = "0.16", default-features = false, features = ["metal"]}

[target.'cfg(target_os = "linux")'.dependencies]
whisper-rs = {version = "0.16", default-features = false}

[profile.release]
codegen-units = 1
debug = false
incremental = false
lto = "fat"
opt-level = 3
panic = "abort"
strip = "symbols"
# Panic on arithmetic overflow in release — a network service silently
# wrapping an integer is worse than a controlled panic that systemd
# restarts. CVE-2018-1000810 is the canonical reason this belongs on.
overflow-checks = true
